<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重复的力量 - 语言学习工具</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource@5.0.1/fonts/inter/standard.css" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="重复的力量">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --card-hover: #232733;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --accent: #fd79a8;
            --success: #00b894;
            --warning: #fdcb6e;
            --text: #f5f5f7;
            --text-secondary: #8b8fa3;
            --border: #2d3040;
            --glow: rgba(108, 92, 231, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            padding: 60px 20px 40px;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(108, 92, 231, 0.15) 0%, transparent 70%);
            animation: pulseBg 8s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .hero h1 {
            position: relative;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .hero p {
            position: relative;
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            margin: 0 auto 20px;
            max-width: 600px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .add-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .add-section h3 {
            margin-bottom: 16px;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--glow);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--glow);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
        }

        .btn-accent {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            color: white;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 10px var(--glow);
        }

        .tab:hover:not(.active) {
            color: var(--text);
            background: var(--card-hover);
        }

        .practice-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            min-height: 300px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .sentence-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            animation: slideIn 0.4s ease;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scene-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(108,92,231,0.15);
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--primary-light);
            margin-bottom: 8px;
        }

        .sentence-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .sentence-translation {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 16px;
            font-style: italic;
        }

        .progress-dots {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .progress-dot {
            width: 28px;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            transition: all 0.3s;
        }

        .progress-dot.filled {
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            box-shadow: 0 0 6px var(--glow);
        }

        .progress-dot.completed {
            background: linear-gradient(90deg, #00b894, #00cec9);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: var(--primary);
            background: var(--card-hover);
            transform: translateY(-1px);
        }

        .action-btn.active {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.15);
            color: var(--primary-light);
        }

        .speaking-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            margin-top: 12px;
        }

        .speaking-indicator.active {
            display: flex;
        }

        .sound-wave {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .sound-bar {
            width: 4px;
            height: 20px;
            background: var(--primary-light);
            border-radius: 2px;
            animation: soundWave 0.8s ease-in-out infinite;
        }

        .sound-bar:nth-child(1) { animation-delay: 0s; height: 10px; }
        .sound-bar:nth-child(2) { animation-delay: 0.1s; height: 18px; }
        .sound-bar:nth-child(3) { animation-delay: 0.2s; height: 14px; }
        .sound-bar:nth-child(4) { animation-delay: 0.3s; height: 22px; }
        .sound-bar:nth-child(5) { animation-delay: 0.4s; height: 12px; }

        @keyframes soundWave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.2); }
        }

        .result-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 184, 148, 0.1);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .result-box .label {
            font-size: 0.8rem;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-box .match {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .result-box .accuracy {
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .practice-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .practice-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--glow);
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 2s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .mode-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            margin-bottom: 20px;
        }

        .mode-emoji {
            font-size: 3rem;
            margin-right: 16px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .mode-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .mode-text strong {
            color: var(--text);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .word-chip {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .word-chip:hover {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
        }

        .word-chip.selected {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.2);
            color: var(--primary-light);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .speed-control label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .speed-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .speed-value {
            color: var(--primary-light);
            font-size: 0.85rem;
            min-width: 35px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            .action-buttons {
                justify-content: center;
            }
            .stats-bar {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🔁 重复的力量</h1>
        <p>重复听 • 重复说 • 重复用 —— 语言学习最有效的获能行为</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-num" id="totalWords">0</div>
            <div class="stat-label">学习条目</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="totalRepeats">0</div>
            <div class="stat-label">总重复次数</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="completed">0</div>
            <div class="stat-label">已掌握</div>
        </div>
    </div>

    <div class="container">
        <div class="add-section">
            <h3>➕ 添加学习内容</h3>
            <div class="input-group">
                <input type="text" id="sentenceInput" placeholder="输入要练习的句子或单词..." />
                <input type="text" id="translationInput" placeholder="翻译/注释（可选）" style="max-width: 200px;" />
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <select id="sceneSelect" style="padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none;">
                    <option value="">选择场景（可选）</option>
                    <option value="健身Scene">💪 健身Scene</option>
                    <option value="点菜Scene">🍽️ 点菜Scene</option>
                    <option value="问路Scene">🗺️ 问路Scene</option>
                    <option value="八卦Scene">💬 八卦Scene</option>
                    <option value="咖啡Scene">☕ 咖啡Scene</option>
                    <option value="寒暄Scene">👋 寒暄Scene</option>
                    <option value="网购Scene">🛒 网购Scene</option>
                    <option value="郊游Scene">🌳 郊游Scene</option>
                    <option value="驾车Scene">🚗 驾车Scene</option>
                    <option value="游泳Scene">🏊 游泳Scene</option>
                </select>
                <button class="btn btn-primary" onclick="addSentence()">添加</button>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn btn-small" style="background: rgba(108,92,231,0.15); color: var(--primary-light);" onclick="loadSample()">加载示例</button>
                <button class="btn btn-small" style="background: rgba(0,184,148,0.15); color: var(--success);" onclick="exportData()">📥 导出备份</button>
                <button class="btn btn-small" style="background: rgba(253,203,110,0.15); color: var(--warning);" onclick="importData()">📤 导入恢复</button>
                <button class="btn btn-small" style="background: rgba(253,121,168,0.15); color: var(--accent);" onclick="clearAll()">清空全部</button>
            </div>
            <div id="sceneFilter" style="margin-top: 16px; display: none;">
                <div style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 8px;">📂 按场景筛选：</div>
                <div style="display: flex; gap: 6px; flex-wrap: wrap;" id="sceneTags"></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('listen')">👂 听</button>
            <button class="tab" onclick="switchTab('speak')">🗣️ 说</button>
            <button class="tab" onclick="switchTab('use')">✍️ 用</button>
        </div>

        <div class="practice-area" id="practiceArea">
            <div class="empty-state">
                <div class="icon">📝</div>
                <p>添加句子或单词开始练习吧</p>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        let sentences = JSON.parse(localStorage.getItem('repeatSentences') || '[]');
        let currentTab = 'listen';
        let speechRate = 1;
        window.currentSceneFilter = '';

        function saveData() {
            localStorage.setItem('repeatSentences', JSON.stringify(sentences));
            updateStats();
            renderSceneFilter();
        }

        function updateStats() {
            document.getElementById('totalWords').textContent = sentences.length;
            const totalR = sentences.reduce((sum, s) => sum + (s.repeatCount || 0), 0);
            document.getElementById('totalRepeats').textContent = totalR;
            const completedCount = sentences.filter(s => (s.repeatCount || 0) >= 5).length;
            document.getElementById('completed').textContent = completedCount;
        }

        function addSentence() {
            const input = document.getElementById('sentenceInput');
            const transInput = document.getElementById('translationInput');
            const sceneSelect = document.getElementById('sceneSelect');
            const text = input.value.trim();
            if (!text) return;

            sentences.push({
                id: Date.now(),
                text: text,
                translation: transInput.value.trim() || '',
                scene: sceneSelect.value || '',
                repeatCount: 0,
                maxRepeats: 5
            });

            input.value = '';
            transInput.value = '';
            sceneSelect.value = '';
            saveData();
            renderPractice();
        }

        function loadSample() {
            const samples = [
                { text: "I'd like a table for two, please.", translation: "请给我安排一张两人桌。", scene: "点菜Scene" },
                { text: "Could you recommend the signature dish?", translation: "能推荐一下招牌菜吗？", scene: "点菜Scene" },
                { text: "Excuse me, how do I get to the nearest subway station?", translation: "请问最近的地铁站怎么走？", scene: "问路Scene" },
                { text: "Let's grab a coffee sometime.", translation: "找个时间一起喝咖啡吧。", scene: "咖啡Scene" },
                { text: "How's it going?", translation: "最近怎么样？", scene: "寒暄Scene" }
            ];

            samples.forEach(s => {
                sentences.push({
                    id: Date.now() + Math.random(),
                    text: s.text,
                    translation: s.translation,
                    scene: s.scene || '',
                    repeatCount: 0,
                    maxRepeats: 5
                });
            });

            saveData();
            renderPractice();
        }

        function clearAll() {
            if (confirm('确定要清空所有学习内容吗？')) {
                sentences = [];
                saveData();
                renderPractice();
            }
        }

        function deleteSentence(id) {
            sentences = sentences.filter(s => s.id !== id);
            saveData();
            renderPractice();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                const tabs = ['listen', 'speak', 'use'];
                t.classList.toggle('active', tabs[i] === tab);
            });
            renderPractice();
        }

        function renderSceneFilter() {
            const scenes = [...new Set(sentences.map(s => s.scene).filter(Boolean))];
            const filterDiv = document.getElementById('sceneFilter');
            const tagsDiv = document.getElementById('sceneTags');
            
            if (scenes.length === 0) {
                filterDiv.style.display = 'none';
                return;
            }
            
            filterDiv.style.display = 'block';
            tagsDiv.innerHTML = `
                <button class="word-chip ${!window.currentSceneFilter ? 'selected' : ''}" 
                        onclick="filterByScene('')">
                    全部 (${sentences.length})
                </button>
            `;
            
            scenes.forEach(scene => {
                const count = sentences.filter(s => s.scene === scene).length;
                tagsDiv.innerHTML += `
                    <button class="word-chip ${window.currentSceneFilter === scene ? 'selected' : ''}" 
                            onclick="filterByScene('${scene}')">
                        ${scene} (${count})
                    </button>
                `;
            });
        }

        function filterByScene(scene) {
            window.currentSceneFilter = scene;
            renderSceneFilter();
            renderPractice();
        }

        function renderPractice() {
            const area = document.getElementById('practiceArea');
            
            const filteredSentences = window.currentSceneFilter 
                ? sentences.filter(s => s.scene === window.currentSceneFilter)
                : sentences;

            if (filteredSentences.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <p>${sentences.length === 0 ? '添加句子或单词开始练习吧' : '该场景下暂无内容'}</p>
                    </div>
                `;
                return;
            }

            let html = '';

            if (currentTab === 'listen') {
                html = `<div class="mode-visual">
                    <div class="mode-emoji">👂</div>
                    <div class="mode-text"><strong>重复听</strong> — 让耳朵熟悉每一个发音</div>
                </div>`;
                html += `<div class="speed-control">
                    <label>语速:</label>
                    <input type="range" class="speed-slider" id="speedSlider" min="0.3" max="2" step="0.1" value="${speechRate}" oninput="updateSpeed(this.value)">
                    <span class="speed-value" id="speedValue">${speechRate}x</span>
                </div>`;

                filteredSentences.forEach((s) => {
                    const dots = generateDots(s);
                    html += `
                        <div class="sentence-card">
                            <button class="delete-btn" onclick="deleteSentence(${s.id})">✕</button>
                            ${s.scene ? `<div class="scene-tag">📂 ${s.scene}</div>` : ''}
                            <div class="sentence-text">${s.text}</div>
                            ${s.translation ? `<div class="sentence-translation">${s.translation}</div>` : ''}
                            <div class="progress-dots">${dots}</div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="speakText('${escapeHtml(s.text)}', ${s.id})">🔊 播放</button>
                                <button class="action-btn" onclick="speakSlowly('${escapeHtml(s.text)}', ${s.id})">🐢 慢速</button>
                                <button class="action-btn" onclick="repeatListen(${s.id})">🔁 重复3遍</button>
                            </div>
                            <div class="speaking-indicator" id="indicator-${s.id}">
                                <div class="sound-wave">
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                </div>
                                <span style="color: var(--primary-light); font-size: 0.85rem; margin-left: 8px;">正在播放...</span>
                            </div>
                        </div>
                    `;
                });
            } else if (currentTab === 'speak') {
                html = `<div class="mode-visual">
                    <div class="mode-emoji">🗣️</div>
                    <div class="mode-text"><strong>重复说</strong> — 让嘴巴记住每一组发音</div>
                </div>`;

                filteredSentences.forEach((s) => {
                    const dots = generateDots(s);
                    html += `
                        <div class="sentence-card">
                            <button class="delete-btn" onclick="deleteSentence(${s.id})">✕</button>
                            ${s.scene ? `<div class="scene-tag">📂 ${s.scene}</div>` : ''}
                            <div class="sentence-text">${s.text}</div>
                            <div class="progress-dots">${dots}</div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="speakText('${escapeHtml(s.text)}', ${s.id})">🔊 先听一遍</button>
                                <button class="action-btn" onclick="startRecognition(${s.id}, '${escapeHtml(s.text)}')">🎤 开始跟读</button>
                            </div>
                            <div class="speaking-indicator" id="indicator-${s.id}">
                                <div class="sound-wave">
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                    <div class="sound-bar"></div>
                                </div>
                                <span style="color: var(--primary-light); font-size: 0.85rem; margin-left: 8px;">正在聆听...</span>
                            </div>
                            <div id="result-${s.id}"></div>
                        </div>
                    `;
                });
            } else if (currentTab === 'use') {
                html = `<div class="mode-visual">
                    <div class="mode-emoji">✍️</div>
                    <div class="mode-text"><strong>重复用</strong> — 让大脑内化每一个表达</div>
                </div>`;

                filteredSentences.forEach((s) => {
                    const dots = generateDots(s);
                    html += `
                        <div class="sentence-card">
                            <button class="delete-btn" onclick="deleteSentence(${s.id})">✕</button>
                            ${s.scene ? `<div class="scene-tag">📂 ${s.scene}</div>` : ''}
                            <div class="sentence-text">${s.text}</div>
                            ${s.translation ? `<div class="sentence-translation">${s.translation}</div>` : ''}
                            <div class="progress-dots">${dots}</div>
                            <input type="text" class="practice-input" id="input-${s.id}" placeholder="默写这句话..." onkeydown="if(event.key==='Enter') checkWriting(${s.id})" />
                            <div class="action-buttons" style="margin-top: 10px;">
                                <button class="action-btn" onclick="checkWriting(${s.id})">✅ 检查</button>
                                <button class="action-btn" onclick="showHint(${s.id}, '${escapeHtml(s.text)}')">💡 提示</button>
                                <button class="action-btn" onclick="markUseDone(${s.id})">🎯 标记为已练习</button>
                            </div>
                            <div id="result-${s.id}"></div>
                        </div>
                    `;
                });
            }

            area.innerHTML = html;
            updateStats();
        }

        function generateDots(s) {
            let dotsHtml = '';
            for (let i = 0; i < s.maxRepeats; i++) {
                if (i < (s.repeatCount || 0)) {
                    if ((s.repeatCount || 0) >= s.maxRepeats) {
                        dotsHtml += `<div class="progress-dot completed"></div>`;
                    } else {
                        dotsHtml += `<div class="progress-dot filled"></div>`;
                    }
                } else {
                    dotsHtml += `<div class="progress-dot"></div>`;
                }
            }
            return dotsHtml;
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function updateSpeed(val) {
            speechRate = parseFloat(val);
            document.getElementById('speedValue').textContent = val + 'x';
        }

        function speakText(text, id) {
            const indicator = document.getElementById('indicator-' + id);
            if (indicator) indicator.classList.add('active');

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = detectLang(text);
            utterance.rate = speechRate;
            utterance.pitch = 1;

            utterance.onend = () => {
                if (indicator) indicator.classList.remove('active');
            };

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function speakSlowly(text, id) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = detectLang(text);
            utterance.rate = 0.5;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function repeatListen(id) {
            const sentence = sentences.find(s => s.id === id);
            if (!sentence) return;
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 3) {
                    clearInterval(interval);
                    incrementRepeat(id);
                    return;
                }
                speakText(sentence.text, id);
                count++;
            }, 2500);
        }

        function startRecognition(id, targetText) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showResult(id, `<div class="result-box">
                    <div class="label">⚠️ 提示</div>
                    <p style="color: var(--text-secondary);">您的浏览器不支持语音识别，请使用 Chrome 浏览器。</p>
                </div>`);
                return;
            }

            const indicator = document.getElementById('indicator-' + id);
            if (indicator) indicator.classList.add('active');

            const recognition = new SpeechRecognition();
            recognition.lang = detectLang(targetText);
            recognition.interimResults = false;
            recognition.maxAlternatives = 3;

            recognition.onresult = (event) => {
                if (indicator) indicator.classList.remove('active');
                const results = event.results[0];
                let bestMatch = '';
                let bestScore = 0;

                for (let i = 0; i < results.length; i++) {
                    const transcript = results[i].transcript;
                    const similarity = calculateSimilarity(targetText.toLowerCase(), transcript.toLowerCase());
                    if (similarity > bestScore) {
                        bestScore = similarity;
                        bestMatch = transcript;
                    }
                }

                const accuracy = Math.round(bestScore * 100);
                const passed = accuracy >= 60;

                if (passed) {
                    incrementRepeat(id);
                }

                showResult(id, `
                    <div class="result-box" style="${passed ? '' : 'border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.1);'}">
                        <div class="label" style="color: ${passed ? 'var(--success)' : '#ff6b6b'}">${passed ? '✅ 发音优秀！' : '💪 继续加油！'}</div>
                        <div class="match">你说的: "${bestMatch}"</div>
                        <div class="accuracy">匹配度: ${accuracy}% | 目标: "${targetText}"</div>
                    </div>
                `);
            };

            recognition.onerror = (event) => {
                if (indicator) indicator.classList.remove('active');
                if (event.error === 'no-speech') {
                    showResult(id, `<div class="result-box">
                        <div class="label">⚠️ 未检测到语音</div>
                        <p style="color: var(--text-secondary);">请再试一次，大声朗读。</p>
                    </div>`);
                }
            };

            recognition.start();
        }

        function calculateSimilarity(s1, s2) {
            const words1 = s1.replace(/[.,!?;:'"()]/g, '').split(/\s+/).filter(w => w);
            const words2 = s2.replace(/[.,!?;:'"()]/g, '').split(/\s+/).filter(w => w);

            if (words1.length === 0 || words2.length === 0) return 0;

            let matches = 0;
            const used = new Set();
            for (const w1 of words1) {
                for (let j = 0; j < words2.length; j++) {
                    if (!used.has(j) && words2[j] === w1) {
                        matches++;
                        used.add(j);
                        break;
                    }
                }
            }

            return matches / Math.max(words1.length, words2.length);
        }

        function checkWriting(id) {
            const sentence = sentences.find(s => s.id === id);
            if (!sentence) return;

            const input = document.getElementById('input-' + id);
            const userText = input.value.trim().toLowerCase().replace(/[.,!?;:'"()]/g, '').replace(/\s+/g, ' ');
            const targetText = sentence.text.toLowerCase().replace(/[.,!?;:'"()]/g, '').replace(/\s+/g, ' ');

            const accuracy = Math.round(calculateSimilarity(targetText, userText) * 100);
            const passed = accuracy >= 80;

            if (passed) {
                incrementRepeat(id);
            }

            showResult(id, `
                <div class="result-box" style="${passed ? '' : 'border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.1);'}">
                    <div class="label" style="color: ${passed ? 'var(--success)' : '#ff6b6b'}">${passed ? '✅ 默写正确！' : '❌ 再想想...'}</div>
                    <div class="accuracy">正确率: ${accuracy}%</div>
                    <div style="margin-top: 8px; color: var(--text-secondary); font-size: 0.9rem;">正确答案: ${sentence.text}</div>
                </div>
            `);
        }

        function showHint(id, text) {
            const sentence = sentences.find(s => s.id === id);
            if (!sentence) return;
            const words = text.split(' ');
            const hintWords = words.map((w, i) => i % 2 === 0 ? w : '___').join(' ');
            showResult(id, `
                <div class="result-box">
                    <div class="label">💡 提示</div>
                    <div class="match" style="font-size: 1rem;">${hintWords}</div>
                </div>
            `);
        }

        function markUseDone(id) {
            incrementRepeat(id);
            const input = document.getElementById('input-' + id);
            if (input) input.value = '';
            showResult(id, `
                <div class="result-box">
                    <div class="label">🎯 已标记为练习完成</div>
                </div>
            `);
        }

        function showResult(id, html) {
            const container = document.getElementById('result-' + id);
            if (container) {
                container.innerHTML = html;
            }
        }

        function incrementRepeat(id) {
            const sentence = sentences.find(s => s.id === id);
            if (!sentence) return;

            if ((sentence.repeatCount || 0) < sentence.maxRepeats) {
                sentence.repeatCount = (sentence.repeatCount || 0) + 1;

                if (sentence.repeatCount >= sentence.maxRepeats) {
                    triggerCelebration();
                }
            }

            saveData();
            renderPractice();
        }

        function triggerCelebration() {
            const container = document.getElementById('celebration');
            const colors = ['#6c5ce7', '#a29bfe', '#fd79a8', '#fdcb6e', '#00b894', '#00cec9'];

            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (1.5 + Math.random()) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function detectLang(text) {
            const hasChinese = /[\u4e00-\u9fff]/.test(text);
            if (hasChinese) return 'zh-CN';
            const hasJapanese = /[\u3040-\u309f\u30a0-\u30ff]/.test(text);
            if (hasJapanese) return 'ja-JP';
            return 'en-US';
        }

        function exportData() {
            if (sentences.length === 0) {
                alert('当前没有学习内容，无法导出！');
                return;
            }
            const dataStr = JSON.stringify(sentences, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().slice(0, 10);
            a.download = `重复的力量_语料备份_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.style.display = 'none';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (!Array.isArray(imported)) throw new Error('格式不是数组');
                        
                        const isValid = imported.every(item => item.text && typeof item.id === 'number');
                        if (!isValid) throw new Error('数据结构不匹配');

                        if (confirm(`检测到 ${imported.length} 条语料。\n点击【确定】覆盖当前数据\n点击【取消】追加到现有列表`)) {
                            sentences = imported;
                        } else {
                            const existingIds = new Set(sentences.map(s => s.id));
                            const newItems = imported.filter(item => !existingIds.has(item.id));
                            sentences = sentences.concat(newItems);
                        }
                        
                        saveData();
                        renderPractice();
                        alert(`✅ 成功导入 ${imported.length} 条语料！`);
                    } catch (err) {
                        alert('❌ 导入失败：文件格式不正确或已损坏。\n' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            
            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        }

        document.getElementById('sentenceInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addSentence();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ PWA 引擎已启动:', reg.scope))
                    .catch(err => console.warn('⚠️ SW 注册失败:', err));
            });
        }

        updateStats();
        renderSceneFilter();
        renderPractice();
    </script>
</body>
</html>
